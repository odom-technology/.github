name: Bug report
description: Report a reproducible problem in an ODOM Technology project.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Remove secrets and private infrastructure details before submitting.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest sanitized sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant versions and platform details without unique identifiers.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
